<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Number 🎯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="card">
    <h1>🎯 Guess the Number</h1>
    <p class="subtitle">Pick a number between <span>1 - 100</span></p>

    <div class="input-group">
      <input type="number" id="guessInput" placeholder="Enter your guess">
      <button onclick="checkGuess()">Guess</button>
    </div>

    <p id="message" class="message">Start guessing...</p>
    <p id="attempts" class="attempts">Attempts: 0</p>

    <button onclick="restartGame()" class="restart">Restart Game</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
